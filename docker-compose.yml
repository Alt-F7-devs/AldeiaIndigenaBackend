services:
  api:
    build: .
    container_name: sei_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/sei_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: DEBUG
    depends_on:
      db:
          condition: service_healthy

  db:
    image: postgres:18
    container_name: sei_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sei_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sei_db"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pgdata:
